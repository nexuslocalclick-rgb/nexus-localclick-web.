<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{NOMBRE_NEGOCIO}} | Digitalizado por Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <header class="relative h-screen flex items-center justify-center text-center text-white bg-cover bg-center" 
            style="background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('{{FOTO_PRINCIPAL}}');">
        <div class="px-4">
            <h1 class="text-5xl md:text-7xl font-bold mb-4 uppercase tracking-tight">{{NOMBRE_NEGOCIO}}</h1>
            <p class="text-xl md:text-2xl mb-8 italic text-blue-300">"{{ESLOGAN}}"</p>
            <a href="https://wa.me/{{WHATSAPP_LINK}}" class="bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-8 rounded-full text-lg shadow-lg transition duration-300 transform hover:scale-105">
                <i class="fab fa-whatsapp mr-2"></i> COTIZAR POR WHATSAPP
            </a>
        </div>
    </header>

    <section class="py-16 px-6 max-w-4xl mx-auto text-center">
        <h2 class="text-3xl font-bold mb-6 text-blue-900">Sobre Nosotros</h2>
        <p class="text-lg text-gray-600 leading-relaxed mb-8">{{DESCRIPCION_GIRO}}</p>
        
        <div class="grid md:grid-cols-2 gap-8 mt-12">
            <div class="bg-white p-6 rounded-xl shadow-md">
                <i class="fas fa-map-marker-alt text-3xl text-blue-600 mb-4"></i>
                <h3 class="font-bold text-xl mb-2">Ubicación</h3>
                <p class="text-gray-500">{{DIRECCION}}</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-md">
                <i class="fas fa-clock text-3xl text-blue-600 mb-4"></i>
                <h3 class="font-bold text-xl mb-2">Horarios</h3>
                <p class="text-gray-500">Lunes a Sábado: 9:00 AM - 6:00 PM</p>
            </div>
        </div>
    </section>

    <footer class="bg-gray-900 text-white py-10 text-center">
        <img src="https://localclick.com.mx/activos/logo-nexus.png" alt="Nexus Logo" class="h-10 mx-auto mb-4 opacity-80">
        <p class="text-sm text-gray-400">Potencializado por <a href="https://localclick.com.mx" class="hover:text-blue-400 font-bold italic">Nexus LocalClick</a></p>
        <p class="text-xs mt-2 text-gray-600">&copy; 2026 Todos los derechos reservados.</p>
    </footer>

</body>
</html>
